<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading — 007 Technologies</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       Design tokens (subset — will move to shared design-system
       when the folder is symlinked into src/)
       ============================================================ */
    :root {
      --bg:            #F0EDE7;
      --bg-warm:       #ECE8E1;
      --bg-smoke:      #9F9D97;
      --bg-smoke-lift: #C5C2BA;
      --text:          #0A0A0A;
      --text-muted:    #5E5B55;
      --text-subtle:   #8B8882;
      --accent:        #B91C1C;
      --accent-hover:  #991B1B;

      --font-sans:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display:  'Bricolage Grotesque', 'Inter', -apple-system, sans-serif;
      --font-mono:     'JetBrains Mono', 'SF Mono', Monaco, monospace;

      --ease:       cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      cursor: default;
      font-family: var(--font-sans);
      background: linear-gradient(
        180deg,
        var(--bg-smoke) 0%,
        var(--bg-smoke) 55%,
        var(--bg-smoke-lift) 82%,
        var(--bg) 100%
      );
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Splash exit animation — body fades + zooms slightly
       when ready to transition */
    body.is-leaving {
      animation: splashLeave 500ms var(--ease-out) forwards;
    }
    @keyframes splashLeave {
      to { opacity: 0; transform: scale(1.02); }
    }

    /* ============================================================
       Helix line field (cinematic background)
       ============================================================ */
    .helix-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .helix { width: 100%; height: 100%; display: block; }
    .helix-lines path {
      fill: none;
      vector-effect: non-scaling-stroke;
    }

    /* ============================================================
       Smoke layers at bottom
       ============================================================ */
    .smoke-wrap {
      position: absolute;
      left: -10%; right: -10%;
      bottom: -15%;
      height: 75%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .smoke-layer {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      will-change: transform;
    }
    .smoke-1 {
      width: 70%; height: 90%; left: -10%; bottom: -20%;
      background: radial-gradient(ellipse at 30% 70%,
        rgba(245, 243, 238, 0.85) 0%,
        rgba(230, 227, 221, 0.55) 35%, transparent 70%);
      animation: smokeDrift1 26s ease-in-out infinite;
    }
    .smoke-2 {
      width: 80%; height: 80%; right: -15%; bottom: -10%;
      background: radial-gradient(ellipse at 70% 80%,
        rgba(240, 237, 231, 0.75) 0%,
        rgba(218, 214, 207, 0.5) 40%, transparent 70%);
      animation: smokeDrift2 32s ease-in-out infinite reverse;
    }
    @keyframes smokeDrift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(4%,-3%) scale(1.08); }
      66%     { transform: translate(-3%,2%) scale(1.04); }
    }
    @keyframes smokeDrift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(-5%,-4%) scale(1.1); }
    }

    /* ============================================================
       Grain overlay (warmth)
       ============================================================ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      opacity: 0.5;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.20 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
    }

    /* ============================================================
       Center content
       ============================================================ */
    .content {
      position: relative;
      z-index: 3;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .file-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px 7px 12px;
      border: 1px solid rgba(10, 10, 10, 0.15);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 44px;
      opacity: 0;
      transform: translateY(12px);
      animation: riseIn 0.9s var(--ease-out) 0.2s forwards;
    }

    .file-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1);   opacity: 1; }
      50%     { transform: scale(1.25); opacity: 0.85; }
    }

    /* Big 007 mark */
    .mark {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      margin-bottom: 32px;
    }

    .mark-num {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 96, 'wght' 800, 'wdth' 95;
      font-size: clamp(140px, 22vw, 280px);
      letter-spacing: -0.055em;
      line-height: 0.85;
      color: #FFFFFF;
      text-shadow: 0 6px 48px rgba(0, 0, 0, 0.18);
    }

    .mark-num .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(40px) scale(0.94);
      animation: charIn 1.1s var(--ease-out) forwards;
    }
    .mark-num .char:nth-child(1) { animation-delay: 0.45s; }
    .mark-num .char:nth-child(2) { animation-delay: 0.58s; }
    .mark-num .char:nth-child(3) { animation-delay: 0.71s; }

    @keyframes charIn {
      0%   { opacity: 0; transform: translateY(50px) scale(0.9); }
      70%  { opacity: 1; transform: translateY(-4px) scale(1.01); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .mark-word {
      display: inline-flex;
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: clamp(15px, 2.1vw, 24px);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--text);
      margin-top: clamp(16px, 2vw, 24px);
      padding-left: 0.55em;
    }

    .mark-word .wchar {
      display: inline-block;
      opacity: 0;
      transform: translateY(14px);
      animation: wordIn 0.7s var(--ease-out) forwards;
    }
    .mark-word .wchar:nth-child(1)  { animation-delay: 1.00s; }
    .mark-word .wchar:nth-child(2)  { animation-delay: 1.05s; }
    .mark-word .wchar:nth-child(3)  { animation-delay: 1.10s; }
    .mark-word .wchar:nth-child(4)  { animation-delay: 1.15s; }
    .mark-word .wchar:nth-child(5)  { animation-delay: 1.20s; }
    .mark-word .wchar:nth-child(6)  { animation-delay: 1.25s; }
    .mark-word .wchar:nth-child(7)  { animation-delay: 1.30s; }
    .mark-word .wchar:nth-child(8)  { animation-delay: 1.35s; }
    .mark-word .wchar:nth-child(9)  { animation-delay: 1.40s; }
    .mark-word .wchar:nth-child(10) { animation-delay: 1.45s; }
    .mark-word .wchar:nth-child(11) { animation-delay: 1.50s; }
    .mark-word .wchar:nth-child(12) { animation-delay: 1.55s; }

    @keyframes wordIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .product-line {
      margin-top: 36px;
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 48, 'wght' 500, 'wdth' 100;
      font-style: italic;
      font-size: clamp(16px, 1.7vw, 20px);
      color: var(--text);
      letter-spacing: -0.005em;
      opacity: 0;
      animation: riseIn 1s var(--ease-out) 1.7s forwards;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       Loading indicator at bottom
       ============================================================ */
    /* Bottom CTA block — single centered element.
       Shows loading bar during initial period, then collapses
       to a thin accent line + click-to-continue text. */
    .bottom-cta {
      position: absolute;
      bottom: 48px;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: riseIn 1s var(--ease-out) 1.8s forwards;
    }

    .bottom-line {
      width: 220px;
      height: 2px;
      background: rgba(10, 10, 10, 0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    /* Animated bar — visible during loading, then fades */
    .bottom-bar {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent,
        var(--accent),
        transparent
      );
      width: 40%;
      animation: loaderSweep 1.8s ease-in-out infinite;
      transition: opacity 400ms ease;
    }
    @keyframes loaderSweep {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Static red accent segment — revealed after loading completes */
    .bottom-line-accent {
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      width: 48px;
      background: var(--accent);
      transform: translateX(-50%) scaleX(0);
      transform-origin: center;
      transition: transform 500ms var(--ease-out);
    }

    .bottom-cta.is-ready .bottom-bar {
      opacity: 0;
    }
    .bottom-cta.is-ready .bottom-line-accent {
      transform: translateX(-50%) scaleX(1);
    }

    .bottom-hint {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: default;
      opacity: 0;
      transition: opacity 400ms ease, color 180ms ease;
    }
    .bottom-cta.is-ready .bottom-hint {
      opacity: 1;
      cursor: pointer;
      color: var(--accent);
    }
    .bottom-hint:hover { color: var(--accent-hover); }
    .bottom-arrow { color: var(--text-subtle); }
    .bottom-cta.is-ready .bottom-arrow { color: var(--accent); }

    /* ============================================================
       Footer (attribution)
       ============================================================ */
    .splash-footer {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      z-index: 3;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-subtle);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      animation: riseIn 0.8s var(--ease-out) 2.3s forwards;
    }

    /* ============================================================
       Click-to-continue (shown after loading completes —
       will be controlled by main.js signal OR a minimum delay)
       ============================================================ */
    /* Codename tag below the product line */
    .codename {
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      animation: riseIn 1s var(--ease-out) 1.95s forwards;
    }
    .click-hint.is-ready { opacity: 1; }
    @keyframes float {
      0%,100% { transform: translate(-50%, 0); }
      50%     { transform: translate(-50%, -4px); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .mark-num .char,
      .mark-word .wchar,
      .file-badge,
      .product-line,
      .loader,
      .splash-footer { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <!-- Animated helix backdrop -->
  <div class="helix-wrap">
    <svg class="helix" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <linearGradient id="heroGrad" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"  stop-color="#450A0A"/>
          <stop offset="20%" stop-color="#7F1D1D"/>
          <stop offset="45%" stop-color="#DC2626"/>
          <stop offset="70%" stop-color="#EA580C"/>
          <stop offset="90%" stop-color="#F59E0B"/>
          <stop offset="100%" stop-color="#FCD34D"/>
        </linearGradient>
      </defs>
      <g class="helix-lines" stroke="url(#heroGrad)" fill="none" stroke-linecap="round"></g>
    </svg>
  </div>

  <!-- Smoke layers -->
  <div class="smoke-wrap" aria-hidden="true">
    <div class="smoke-layer smoke-1"></div>
    <div class="smoke-layer smoke-2"></div>
  </div>

  <!-- Content -->
  <div class="content">

    <div class="file-badge">
      <span class="dot"></span>
      <span>File № 007-T-2026</span>
    </div>

    <h1 class="mark" aria-label="007 Technologies">
      <span class="mark-num">
        <span class="char">0</span><span class="char">0</span><span class="char">7</span>
      </span>
      <span class="mark-word">
        <span class="wchar">T</span><span class="wchar">e</span><span class="wchar">c</span><span class="wchar">h</span><span class="wchar">n</span><span class="wchar">o</span><span class="wchar">l</span><span class="wchar">o</span><span class="wchar">g</span><span class="wchar">i</span><span class="wchar">e</span><span class="wchar">s</span>
      </span>
    </h1>

    <p class="product-line">Substitution Request Generator</p>
    <p class="codename">CIPHER PROJECT</p>

  </div>

  <!-- Bottom CTA — single centered element -->
  <div class="bottom-cta" id="bottom-cta">
    <div class="bottom-line">
      <div class="bottom-bar" id="bottom-bar"></div>
      <div class="bottom-line-accent"></div>
    </div>
    <div class="bottom-hint" id="bottom-hint">
      <span>Click to continue</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="splash-footer">
    007 Technologies LLC
  </div>

  <script>
    /* ============================================================
       Helix animation — inline copy of design-system/helix.js
       ============================================================ */
    (function () {
      const wrap = document.querySelector('.helix-wrap');
      const group = wrap?.querySelector('.helix-lines');
      if (!group) return;

      const prefersReducedMotion =
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const SVG_NS = 'http://www.w3.org/2000/svg';
      const NUM_LINES = prefersReducedMotion ? 40 : 78;
      const SEGMENTS = 14;
      const TILT = 14;
      const linePaths = [];

      for (let i = 0; i < NUM_LINES; i++) {
        const path = document.createElementNS(SVG_NS, 'path');
        const t = i / (NUM_LINES - 1);
        const distFromCenter = Math.abs(t - 0.5) * 2;
        const sw = 0.26 - distFromCenter * 0.08;
        const so = 0.80 - distFromCenter * 0.15;
        path.setAttribute('stroke-width', sw.toFixed(3));
        path.setAttribute('stroke-opacity', so.toFixed(2));
        group.appendChild(path);
        linePaths.push({
          el: path,
          phase: i * 0.28,
          baseY: t * 120 - 10,
          wobble: 1.0,
          amp: 2.4,
        });
      }

      let targetX = 50, targetY = 50;
      let smoothX = 50, smoothY = 50;
      let mouseActive = false;
      let lastMouseActivity = 0;

      window.addEventListener('mousemove', (e) => {
        const rect = wrap.getBoundingClientRect();
        targetX = ((e.clientX - rect.left) / rect.width) * 100;
        targetY = ((e.clientY - rect.top) / rect.height) * 100;
        mouseActive = true;
        lastMouseActivity = performance.now();
      }, { passive: true });

      function buildPath(line, time) {
        const drift = time * 0.00028;
        let d = '';
        for (let s = 0; s <= SEGMENTS; s++) {
          const t = s / SEGMENTS;
          const x = t * 128 - 14;
          let y = line.baseY + TILT * (t - 0.5);
          const wavePhase = line.phase + drift + s * 0.42 * line.wobble;
          y += Math.sin(wavePhase) * line.amp;
          y += Math.cos(wavePhase * 0.53 + line.phase * 0.3) * 0.8;
          const dx = x - smoothX;
          const dy = y - smoothY;
          const distSq = dx * dx + dy * dy;
          const falloff = 28 / (1 + distSq * 0.016);
          if (distSq > 0.01) {
            const dist = Math.sqrt(distSq);
            y += (dy / dist) * falloff;
          }
          d += (s === 0 ? 'M' : ' L') + x.toFixed(2) + ' ' + y.toFixed(2);
        }
        return d;
      }

      function animate(time) {
        if (!mouseActive || time - lastMouseActivity > 3000) {
          const t = time * 0.0002;
          targetX = 50 + Math.sin(t) * 30;
          targetY = 50 + Math.cos(t * 0.9) * 22;
        }
        smoothX += (targetX - smoothX) * 0.05;
        smoothY += (targetY - smoothY) * 0.05;
        for (let i = 0; i < linePaths.length; i++) {
          linePaths[i].el.setAttribute('d', buildPath(linePaths[i], time));
        }
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    })();

    /* ============================================================
       Bottom CTA choreography
       Animated loading bar during first ~2.5s, then collapses
       to a static red accent line + clickable "Click to continue"
       ============================================================ */

    const bottomCta = document.getElementById('bottom-cta');
    let ready = false;

    setTimeout(() => {
      bottomCta.classList.add('is-ready');
      ready = true;
    }, 2500);

    // Click to dismiss (only after ready)
    document.body.addEventListener('click', () => {
      if (!ready) return;
      document.body.classList.add('is-leaving');
      setTimeout(() => {
        window.close();
      }, 500);
    });
  </script>
</body>
</html>
